steps:
  - name: 'python:3.10-slim'
    id: 'Validate'
    entrypoint: 'bash'
    args: ['scripts/validate_dag.sh']
    
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: 'bash'
    args: ['scripts/deploy_dag.sh']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Trigger'
    entrypoint: 'bash'
    args: ['scripts/trigger_dag.sh']
