steps:
  - name: 'python:3.10-slim'
    id: 'Validate'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install --upgrade pip
        pip install -r requirements.txt
        
        chmod +x scripts/validate_dag.sh
        ./scripts/validate_dag.sh

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: 'bash'
    args: ['scripts/deploy_dag.sh']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Trigger'
    entrypoint: 'bash'
    args: ['scripts/trigger_dag.sh']

serviceAccount: 'projects/duynp20-project/serviceAccounts/cloudbuil-deployer@duynp20-project.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY
